<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Quvex WhatsApp Status — Uretim Bugun</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e2e8f0;font-family:'Inter',sans-serif;}
.card{width:1080px;height:1920px;background:linear-gradient(180deg,#0f172a 0%,#1e1b4b 40%,#4338ca 100%);color:#fff;position:relative;overflow:hidden;padding:100px 80px;}
.logo{font-size:40px;font-weight:900;letter-spacing:-1px;text-align:center;margin-bottom:40px;}
.q{font-size:80px;font-weight:900;text-align:center;line-height:1.05;letter-spacing:-2px;margin-bottom:80px;}
.q .h{color:#fbbf24;display:block;}
.panel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:30px;padding:50px;backdrop-filter:blur(10px);}
.panel-title{font-size:22px;opacity:0.7;text-transform:uppercase;letter-spacing:3px;margin-bottom:26px;text-align:center;}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:44px;}
.kpi-card{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:36px 24px;text-align:center;}
.kpi-card .v{font-size:72px;font-weight:900;color:#fbbf24;line-height:1;}
.kpi-card .l{font-size:18px;opacity:0.8;margin-top:10px;text-transform:uppercase;letter-spacing:1px;}
.bar-label{font-size:20px;font-weight:700;margin-bottom:14px;}
.bar{background:rgba(255,255,255,0.12);border-radius:30px;height:44px;overflow:hidden;margin-bottom:22px;}
.bar-fill{height:100%;background:linear-gradient(90deg,#10b981 0%,#6ee7b7 100%);border-radius:30px;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;font-size:18px;font-weight:900;color:#064e3b;}
.cta{position:absolute;bottom:100px;left:0;right:0;text-align:center;}
.cta .big{font-size:42px;font-weight:900;color:#fbbf24;margin-bottom:10px;}
.cta .url{font-size:28px;opacity:0.9;font-weight:600;}
</style></head><body>
<div class="card">
  <div class="logo">QUVEX</div>
  <div class="q">Bugun uretim<br><span class="h">ne kadar?</span></div>
  <div class="panel">
    <div class="panel-title">Canli Pano — 14:30</div>
    <div class="kpi">
      <div class="kpi-card"><div class="v">87</div><div class="l">Adet / Plan 100</div></div>
      <div class="kpi-card"><div class="v">%74</div><div class="l">OEE</div></div>
    </div>
    <div class="bar-label">🔧 Torna T01 — %92</div>
    <div class="bar"><div class="bar-fill" style="width:92%">92%</div></div>
    <div class="bar-label">🔧 Freze F01 — %68</div>
    <div class="bar"><div class="bar-fill" style="width:68%;background:linear-gradient(90deg,#f59e0b 0%,#fbbf24 100%);color:#78350f">68%</div></div>
  </div>
  <div class="cta">
    <div class="big">Anlik Tak · Geriden Kalma</div>
    <div class="url">quvex.io</div>
  </div>
</div>
</body></html>
