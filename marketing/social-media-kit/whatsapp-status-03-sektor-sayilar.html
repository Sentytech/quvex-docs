<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Quvex WhatsApp Status — Sektor Basari Sayilari</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e2e8f0;font-family:'Inter',sans-serif;}
.card{width:1080px;height:1920px;background:linear-gradient(180deg,#065f46 0%,#1e1b4b 55%,#0f172a 100%);color:#fff;position:relative;overflow:hidden;padding:100px 70px;display:flex;flex-direction:column;}
.logo{font-size:38px;font-weight:900;letter-spacing:-1px;text-align:center;margin-bottom:20px;}
.headline{font-size:72px;font-weight:900;text-align:center;line-height:1;letter-spacing:-2px;margin-bottom:14px;}
.headline .h{color:#fbbf24;display:block;font-size:90px;margin-top:8px;}
.sub{font-size:22px;text-align:center;opacity:0.8;margin-bottom:60px;}
.grid{flex:1;display:flex;flex-direction:column;gap:26px;}
.row{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:22px;padding:34px 38px;backdrop-filter:blur(10px);display:flex;align-items:center;gap:24px;}
.row .ico{font-size:52px;width:80px;text-align:center;}
.row .txt{flex:1;}
.row .sec{font-size:22px;font-weight:700;margin-bottom:4px;}
.row .met{font-size:16px;opacity:0.75;}
.row .val{font-size:48px;font-weight:900;color:#fbbf24;line-height:1;}
.cta{text-align:center;margin-top:46px;}
.cta .big{font-size:36px;font-weight:900;color:#fbbf24;}
.cta .url{font-size:26px;opacity:0.9;font-weight:600;margin-top:8px;}
</style></head><body>
<div class="card">
  <div class="logo">QUVEX</div>
  <div class="headline">Sektor<br><span class="h">Sayilari</span></div>
  <div class="sub">Quvex ile gercek iyilestirmeler</div>
  <div class="grid">
    <div class="row">
      <div class="ico">⚙️</div>
      <div class="txt"><div class="sec">CNC</div><div class="met">OEE +6 puan, teklif fiyat hatasi -73%</div></div>
      <div class="val">+22%</div>
    </div>
    <div class="row">
      <div class="ico">🛡️</div>
      <div class="txt"><div class="sec">Savunma</div><div class="met">AS9100 audit hazirlik 3 ay → 2 hafta</div></div>
      <div class="val">-83%</div>
    </div>
    <div class="row">
      <div class="ico">🍞</div>
      <div class="txt"><div class="sec">Gida</div><div class="met">Recall simulasyon 6 saat → 23 dakika</div></div>
      <div class="val">-95%</div>
    </div>
    <div class="row">
      <div class="ico">🧵</div>
      <div class="txt"><div class="sec">Tekstil</div><div class="met">Trendyol stok hatasi, aylik ceza</div></div>
      <div class="val">-%96</div>
    </div>
  </div>
  <div class="cta">
    <div class="big">Demo iste →</div>
    <div class="url">quvex.io</div>
  </div>
</div>
</body></html>
