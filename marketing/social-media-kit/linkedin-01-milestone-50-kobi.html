<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Quvex LinkedIn — 50 KOBI Milestone</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#e2e8f0;font-family:'Inter',sans-serif;}
.card{width:1200px;height:628px;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#4338ca 100%);color:#fff;position:relative;overflow:hidden;}
.circle1{position:absolute;right:-120px;top:-120px;width:480px;height:480px;border-radius:50%;background:rgba(99,102,241,0.18);}
.circle2{position:absolute;left:-100px;bottom:-150px;width:380px;height:380px;border-radius:50%;background:rgba(139,92,246,0.12);}
.content{position:relative;z-index:2;padding:80px 70px;height:100%;display:flex;flex-direction:column;justify-content:center;}
.badge{display:inline-block;background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.5);border-radius:30px;padding:8px 20px;font-size:13px;font-weight:700;color:#6ee7b7;letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;width:fit-content;}
.headline{font-size:78px;font-weight:900;line-height:1.05;letter-spacing:-2px;margin-bottom:20px;}
.headline .big{color:#a5b4fc;font-size:96px;}
.sub{font-size:22px;font-weight:400;opacity:0.85;margin-bottom:40px;max-width:720px;line-height:1.4;}
.stats{display:flex;gap:48px;}
.stat .n{font-size:44px;font-weight:900;color:#fbbf24;}
.stat .l{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;opacity:0.7;margin-top:4px;}
.logo{position:absolute;top:40px;right:60px;font-size:28px;font-weight:900;letter-spacing:-1px;z-index:3;}
.url{position:absolute;bottom:30px;right:60px;font-size:14px;color:#a5b4fc;font-weight:700;z-index:3;}
</style></head><body>
<div class="card">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="logo">QUVEX</div>
  <div class="content">
    <div class="badge">🎯 MILESTONE · NISAN 2026</div>
    <div class="headline">50 KOBI<br><span class="big">1 PLATFORM</span></div>
    <div class="sub">Turkiye'nin kuculük-orta olcekli fabrikalari Quvex ile uretim yonetimini dijitallesiriyor. Bir sonraki durak: 200.</div>
    <div class="stats">
      <div class="stat"><div class="n">50+</div><div class="l">Aktif Tenant</div></div>
      <div class="stat"><div class="n">18</div><div class="l">Sektor Profili</div></div>
      <div class="stat"><div class="n">5 dk</div><div class="l">Onboarding</div></div>
      <div class="stat"><div class="n">0</div><div class="l">Guvenlik Acigi</div></div>
    </div>
  </div>
  <div class="url">quvex.io</div>
</div>
</body></html>
